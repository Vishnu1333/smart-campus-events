spring.application.name=EventManagement

# Hosting platforms usually provide the PORT environment variable.
server.port=${PORT:8080}

# Local database defaults to an H2 file so registrations survive app restarts.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/eventmanagement;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# OTP settings.
otp.ttl-minutes=${OTP_TTL_MINUTES:5}
otp.max-attempts=${OTP_MAX_ATTEMPTS:5}



# Mail properties (configure these for real emails, otherwise EmailService runs in Mock mode)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
