spring.application.name=EventManagement

# Hosting platforms usually provide the PORT environment variable.
server.port=${PORT:8080}

# Local database defaults to an H2 file so registrations survive app restarts.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/eventmanagement;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# OTP settings.
otp.ttl-minutes=${OTP_TTL_MINUTES:5}
otp.max-attempts=${OTP_MAX_ATTEMPTS:5}

# Twilio SMS settings. Set these environment variables online for real SMS OTPs.
twilio.account-sid=${TWILIO_ACCOUNT_SID:mock_account_sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:mock_auth_token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+1234567890}

# Admin phone number for registration notifications.
admin.phone.number=${ADMIN_PHONE_NUMBER:+919876543210}

# Mail properties (configure these for real emails, otherwise EmailService runs in Mock mode)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=veltechcampusevents@gmail.com
spring.mail.password=vzqtisfefcknaxhf
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
email.from-address=Vel Tech Campus Events <veltechcampusevents@gmail.com>

# Firebase Admin SDK credentials for Spring Boot token verification.
# Prefer FIREBASE_SERVICE_ACCOUNT_BASE64 online, or GOOGLE_APPLICATION_CREDENTIALS locally.
firebase.project-id=${FIREBASE_PROJECT_ID:smart-campus-event-management}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}
firebase.service-account-path=${GOOGLE_APPLICATION_CREDENTIALS:src/main/resources/serviceAccountKey.json}
